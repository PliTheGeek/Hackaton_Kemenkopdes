name: Deploy Web App via Git Pull

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy web app only
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
                set -e
                branch="${{ github.ref_name }}"
                app_dir="$HOME/web-kemenkopdes"

                mkdir -p "$app_dir"
                sudo chown -R "$USER:$USER" "$app_dir"
                cd "$app_dir"

                if [ ! -d .git ]; then
                  git clone --branch "$branch" --single-branch \
                    https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
                else
                  git config --global --add safe.directory "$app_dir"

    # fetch branch tip and reset to it
    git fetch --depth=1 origin "$branch"
    git reset --hard FETCH_HEAD
    git clean -fd
  fi

  sudo docker run --rm \
    -v "$PWD:/app" \
    -w /app \
    node:20-alpine \
    sh -lc "npm install && npm run build"

  rm -rf public/*
  cp -r dist/* public/
  sudo docker exec web-kemenkopdes nginx -s reload
              echo "Deploy Kemenkopdes selesai. node-web dan mqtt-broker tidak disentuh."