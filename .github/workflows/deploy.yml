name: Deploy Web App via Git Pull

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy web app only
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
              set -e
              branch="${{ github.ref_name }}"
              app_dir="/var/opt/web-kemenkopdes"

              echo "Tersambung ke server, mulai deploy Kemenkopdes web app..."
              mkdir -p "$app_dir"

              # Ensure current SSH user can write git objects
              sudo chown -R "$USER:$USER" "$app_dir"
              sudo find "$app_dir" -type d -exec chmod u+rwx {} \;
              sudo find "$app_dir" -type f -exec chmod u+rw {} \;

              cd "$app_dir"
              repo_url="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

              if [ ! -d .git ]; then
                git clone --branch "$branch" --single-branch "$repo_url" .
              else
                git config --global --add safe.directory "$app_dir"
                git remote set-url origin "$repo_url"
                git fetch origin "$branch"
                git reset --hard FETCH_HEAD
                git clean -fd
              fi

              sudo docker run --rm \
                -v "$PWD:/app" \
                -w /app \
                node:20-alpine \
                sh -lc "npm install && npm run build"

              cp -r dist/. "$app_dir"/
              sudo docker exec web-kemenkopdes nginx -s reload
              echo "Deploy Kemenkopdes selesai. node-web dan mqtt-broker tidak disentuh."