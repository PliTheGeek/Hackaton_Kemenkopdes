name: Deploy Web App via Git Pull

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy web app only
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            set -e
            echo "Tersambung ke server, mulai deploy Kemenkopdes web app..."
            sudo mkdir -p "$HOME/web-kemenkopdes"
            cd "$HOME/web-kemenkopdes"
            if [ ! -d .git ]; then
              git clone --branch main --single-branch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            elif [ -s "/usr/local/nvm/nvm.sh" ]; then
              . "/usr/local/nvm/nvm.sh"
            fi
            if ! command -v npm >/dev/null 2>&1; then
              echo "npm tidak ditemukan di server. Pastikan Node.js terpasang atau nvm dimuat dengan benar."
              exit 1
            fi
            npm install
            npm run build
            rm -rf public/*
            cp -r dist/* public/
            sudo docker exec web-kemenkopdes nginx -s reload
            echo "Deploy Kemenkopdes selesai. node-web dan mqtt-broker tidak disentuh."